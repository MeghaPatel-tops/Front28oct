<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-3">
    <div class="row">
        <div class="col-xl-6 border rounded p-5">
             <h2>User Registration form</h2>
  <form id="reg" method="post">
    <div class="mb-3 mt-3">
      <label for="username">Name:</label>
      <input type="text" class="form-control" id="username" placeholder="Enter Username" name="email">
    </div>
    <div class="mb-3 mt-3">
      <label for="email">Email:</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
    </div>
    <div class="mb-3">
      <label for="pwd">Password:</label>
      <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd">
    </div>
   
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
        </div>
    </div>
</div>
<div class="container mt-5">
  <h1>Users Info</h1>
     <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">UserName</th>
      <th scope="col">Email</th>
      
    </tr>
  </thead>
  <tbody id="result">
    
  </tbody>
</table>
</div>


<script>
    let userData = [];

    function getUsers(){
          let users = localStorage.getItem('users');
          users = JSON.parse(users)
          console.log(users);
          let str="";
         users.forEach((index,i,users)=>{
            str+=`
                    <tr>
              <th scope="row">${i+1}</th>
              <td>${index.username}</td>
              <td>${index.email}</td>
            </tr>
  
            `
         })
         document.getElementById('result').innerHTML=str;
          
          
    }
    document.getElementById('reg').addEventListener('submit',(e)=>{
        e.preventDefault()
        let username =document.getElementById('username')
        let email =document.getElementById('email');
        let pwd = document.getElementById('pwd');
         let userObj={
            username:username.value,
            email:email.value,
            pwd:pwd.value,
         }

         let userCheck = localStorage.getItem('users');
         if(userCheck){
              let preUsers = JSON.parse(localStorage.getItem('users'));
              console.log(preUsers);

              preUsers.push(userObj);
              console.log(preUsers);
              localStorage.setItem('users',JSON.stringify(preUsers));
              
              
         }

      else{
              console.log(userObj);
         userData.push(userObj);

         username.value="";
         email.value="";
         pwd.value=""

         console.log(userData);

         localStorage.setItem('users',JSON.stringify(userData));
      }

      getUsers();
         
         
    })


    window.onload=getUsers()
</script>
</body>
</html>
