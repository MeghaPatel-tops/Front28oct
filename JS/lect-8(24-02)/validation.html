<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .pbox p{
            color: red;
        }
    </style>
    <style>
        body{
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            padding: 50px 30px;
            border: 5px solid black;
            border-radius: 20px;
        }
        .form-group{
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Registraion form
        </h1>
        <form method="post" id="frm1">
            <div class="form-group" id="er-un">
                <label for="">Enter Username</label>
                <input type="text" name="" id="username">
                 <p id="er-uname" style="color: red;display: none;"></p>
            </div>
            <div class="form-group" >
                <label for="">Enter Email</label>
                <input type="text" name="" id="email">
                <p id="er-email" style="color: red;display: none;"></p>
            </div>
            <div class="form-group">
                <label for="">Enter Password</label>
                <input type="text" name="" id="pwd">
                <div class="pbox" id="pbox" style="display: none;">
                    <p id="para-1">At Least one lowercase(a-z)</p>
                    <p id="para-2">At Least one uppercase(A-Z)</p>
                    <p id="para-3">Min 8 characters</p>
                    <p id="para-4">Special symbols</p>
                    <p id="para-5">0-9</p>
                </div>
            </div>
            <div class="form-group">
                <input type="submit" value="submit" id="submit">
            </div>
        </form>
    </div>


    <script>
   let pwd=document.getElementById('pwd');
       pwd.addEventListener('focus',function(){
            document.getElementById('pbox').style.display="block"
        })

        function validateEmail(email) {
    let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return regex.test(email);
}
        document.getElementById('frm1').addEventListener('submit',function(e){
            e.preventDefault();

            //======================Username=================
            let username= document.getElementById('username');
            let errorUsername = document.getElementById('er-uname');
            if(username.value == ""){
                
                errorUsername.style.display="block";
                errorUsername.innerText="UserName required";
            }
            else{
                errorUsername.style.display="none";
            }

            //==================Email====================
            let email = document.getElementById('email');
            let errorEmail= document.getElementById('er-email');
            if(email.value ==""){
                errorEmail.style.display="block";
                errorEmail.innerText="Enter email"
            }
            else if(!validateEmail(email.value)){
                errorEmail.style.display="block";
                errorEmail.innerText="Enter valid email ex(abc@example.com)"
            }
            else{
                errorEmail.style.display="none";
              
            }
        })
    
    
    pwd.addEventListener('keyup',function(e){
        let value= e.target.value;
        console.log(value);
        
        if(/^(?=.*[A-Z]).+$/.test(value)){
            document.getElementById('para-2').style.color="green"
        }
        else{
            document.getElementById('para-2').style.color="red"
        }
         if(/^(?=.*[a-z]).+$/.test(value)){
            document.getElementById('para-1').style.color="green"
        }
        else{
            document.getElementById('para-1').style.color="red"
        }
        if(/^(?=.*[0-9]).+$/.test(value)){
            document.getElementById('para-5').style.color="green"
        }
        else{
            document.getElementById('para-5').style.color="red"
        }
        if( /^(?=.*[@$!%*?&]).+$/.test(value)){
            document.getElementById('para-4').style.color="green"
        }
         else{
            document.getElementById('para-4').style.color="red"
        }
        if(value.length>=8){
            document.getElementById('para-3').style.color="green"
        }
         else{
            document.getElementById('para-3').style.color="red"
        }
    })
    </script>
   
</body>
</html>
