<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

</head>
<body>
    <div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <div class="card shadow-sm p-4">
                <h3 class="text-center mb-3">Add Quiz Question</h3>

                <form id="quizForm">

                    <!-- Question -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Question</label>
                        <input type="text" class="form-control" placeholder="Enter your question" required id="question">
                    </div>

                    <h5 class="mt-3 mb-2">Options</h5>

                    <!-- Option Inputs -->
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text" class="form-control" placeholder="Option 1" required id="op1">
                        </div>

                        <div class="col-md-6">
                            <input type="text" class="form-control" placeholder="Option 2" required id="op2">
                        </div>

                        <div class="col-md-6">
                            <input type="text" class="form-control" placeholder="Option 3" required id="op3">
                        </div>

                        <div class="col-md-6">
                            <input type="text" class="form-control" placeholder="Option 4" required id="op4">
                        </div>
                    </div>

                    <!-- Correct Answer -->
                    <div class="mt-4">
                        <label class="form-label fw-bold">Correct Answer</label>
                        <input type="text" class="form-control" placeholder="Enter correct option" required id="answer">
                    </div>

                    <!-- Submit Button -->
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary px-4" id="addQuestion">Save Question</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>
<script>
     document.getElementById('quizForm').addEventListener('submit',function(e){
            e.preventDefault();
            let question = document.getElementById('question');
            let op1= document.getElementById('op1')
            let op2= document.getElementById('op2')
            let op3= document.getElementById('op3')
            let op4= document.getElementById('op4')
            let ans = document.getElementById('answer');

            let questionObj={
                 question:question.value, 
                 options:[op1.value,op2.value,op3.value,op4.value],
                  answer:ans.value }
           
            let quizFlag = localStorage.getItem('quiz');
            if(quizFlag){
                
                quizFlag= JSON.parse(quizFlag);
                quizFlag.push(questionObj)
                localStorage.setItem('quiz',JSON.stringify(quizFlag))
            }
            else{
                 console.log(questionObj);

                    let quiz=[];
                    quiz.push(questionObj);

                    localStorage.setItem('quiz',JSON.stringify(quiz))
            }
                  
     })
</script>
</body>
</html>
