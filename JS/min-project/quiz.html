<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

</head>
<body>
    <div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <div class="card shadow-sm p-4">
                
                <!-- Question Text -->
               

             
              <form method="post" id="frm">
                 <h5 class="fw-bold mb-3" id="question">1. What is the capital of India?</h5>
                  <div id="checkboxid">

                </div>
                <input type="hidden" name="" id="answer">
                <input type="submit" value="Submit" id="ansSubmit">
              </form>
            <div id="res"></div>
                

            </div>

        </div>
    </div>
    <script>
        let i=0;
        
        let result=[];
        function printResult(){
            document.getElementById('frm').style.display="none";
            str="<h1>Your Score</h1>"
            let count=0;
            result.map((index,i)=>{
                if(index.flag==true){
                    count++;
                }
                str+=`
                    <p>Question:${index.question} = ${index.flag}</p>
                `
            })  
            str+=`<h3>You Got ${count}/5</h3>`
            document.getElementById('res').innerHTML=str;

            
        }
       
        document.getElementById('frm').addEventListener('submit',function(e){
           
            
            e.preventDefault();
          
            let ans = document.querySelector('input[name="op"]:checked')?.value;
           

            let hiddenAns = document.getElementById('answer').value;
            let resultObj;
            if(hiddenAns==ans){
                //alert("Correct")
                resultObj={
                    question:i+1,
                    flag:true
                }
            }
            else{
                //alert("incorrect")
                resultObj={
                    question:i+1,
                    flag:false
                }
            }

            result.push(resultObj)
           
            if(i==4){
                    
            }
            else{
            i++;
            console.log("after i=",i);
             loadQuestion(i);
            }
            
  
           
        })

        function prePareQuestion(data){
            document.getElementById('question').innerText=data.question
            let str="";
            data.options.map((index,i)=>{
                str+=`
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="op" value="${index}">
                    <label class="form-check-label" for="opt4" id="lbl4">
                    ${index}
                    </label>
                </div>
                `
            })
            document.getElementById('checkboxid').innerHTML=str
            document.getElementById('answer').value=data.answer;
        }

        function loadQuestion(no){
            let quizArray = localStorage.getItem('quiz');
            quizArray = JSON.parse(quizArray)
           
            prePareQuestion(quizArray[no])
            
        }

        loadQuestion(i);
    </script>
</body>
</html>
