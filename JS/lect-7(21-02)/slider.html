<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hero{
            height: 600px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .slider-div{
            position: absolute;
        }

        .slider-div img{
            height: 100%;
            width: 100%;
        }
        .btn-left{
            padding: 10px;
            position:absolute;
            z-index: 1;
            background-color: white;
            color: black;
            top: 50%;
            left: 100px;
        }
         .btn-right{
            padding: 10px;
            position:absolute;
            z-index: 1;
            background-color: white;
            color: black;
            top: 50%;
            right: 100px;
        }

    </style>
</head>
<body>
    
    <div class="hero">
        <div class="slider-div">
            <img src="images/banner_1.jpg" alt="" id="img-1">
            <img src="images/banner_2.jpg" alt="" id="img-2">
            <img src="images/banner_3.jpg" alt="" id="img-3">
        </div>
        <button class="btn-left" id="btn-left">
            Left
        </button>
        <button class="btn-right" id="btn-right">
            Right
        </button>
    </div>

    <script>
        counter =1;
        let img1= document.getElementById('img-1');
        let img2= document.getElementById('img-2');
        let img3= document.getElementById('img-3');

        img2.style.display="none";
        img3.style.display="none";

        document.getElementById('btn-right').addEventListener('click',()=>{
           
            console.log("before counter=",counter);
            
            let imgid=  "img-"+counter;
            document.getElementById(imgid).style.display="none";
            console.log(imgid);
            
            counter++;

             if(counter > 3){
                counter=1;
             }
            imgid=  "img-"+counter;
            document.getElementById(imgid).style.display="block";
              console.log(imgid);
               console.log("after counter=",counter);
          
        })


        document.getElementById('btn-left').addEventListener('click',()=>{
            console.log("before counter=",counter);
              document.getElementById('img-'+counter).style.display="none";

              counter--;
              if(counter < 1){
                  counter=3
              }
            console.log("after counter=",counter);
          
               document.getElementById('img-'+counter).style.display="block";
        })

    </script>
</body>
</html>
