<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="" id="txt1">
    <ul id="flist">
        
    </ul>


<script>
       let fuitsList= ['apple','kiwi','banana','barries','avacado','chicku'];

       function printList(array){
             let str="";
             for(let i=0;i<array.length;i++){
                str+=`
                 <li>${array[i]}</li>
                `
             }
             console.log(str);
             document.getElementById('flist').innerHTML=str
       }

       printList(fuitsList)

       document.getElementById('txt1').addEventListener('keyup',function(e){
             let substr = e.target.value;
             let newArray=[];
             for(let i=0;i<fuitsList.length;i++){
                    if(fuitsList[i].indexOf(substr) >= 0){
                        console.log(fuitsList[i]);
                        
                         newArray.push(fuitsList[i])
                    }

             }
             console.log(newArray);
             printList(newArray)

       })
</script>

</body>
</html>
